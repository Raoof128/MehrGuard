name: Bug Report
description: Report a reproducible bug or crash in Mehr Guard
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible so we can reproduce and fix it quickly.

        > For **security vulnerabilities**, do not use this form. See [SECURITY.md](../iosApp/SECURITY.md) for the responsible disclosure process.

  - type: input
    id: version
    attributes:
      label: App Version
      description: Found in Settings → About, or the App Store listing.
      placeholder: "e.g. 1.20.33"
    validations:
      required: true

  - type: input
    id: ios_version
    attributes:
      label: iOS Version
      placeholder: "e.g. iOS 18.3.2"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "e.g. iPhone 16 Pro, iPhone SE (3rd gen)"
    validations:
      required: true

  - type: dropdown
    id: engine
    attributes:
      label: Analysis Engine
      description: Check Settings → About → Engine badge.
      options:
        - Swift Engine (default, no KMP framework)
        - KMP Engine (common.framework linked)
        - Not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that reliably reproduce the issue.
      placeholder: |
        1. Open the scanner screen
        2. Scan the QR code containing '...'
        3. Observe the result panel
        4. See incorrect verdict
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include any error messages or screenshots.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / crash report
      description: Paste any console output, crash logs, or Xcode output here (optional).
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This is not a security vulnerability (if it is, I will use the security reporting process instead).
          required: true
