name: iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  unit-build-test:
    name: Build + Unit Tests
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Simulator
        id: sim
        shell: bash
        run: |
          set -euo pipefail
          sim_name="$(xcrun simctl list devices available | sed -n 's/^[[:space:]]*\(iPhone[^()]*\) ([A-F0-9-]\{36\}) (.*$/\1/p' | head -n 1 | xargs)"
          if [[ -z "${sim_name}" ]]; then
            echo "No available iPhone simulator found."
            exit 1
          fi
          echo "name=${sim_name}" >> "$GITHUB_OUTPUT"

      - name: Build App Scheme
        run: |
          xcodebuild \
            -project MehrGuard.xcodeproj \
            -scheme MehrGuard \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }},OS=latest" \
            build

      - name: Run Shared Scheme Tests
        run: |
          xcodebuild \
            -project MehrGuard.xcodeproj \
            -scheme MehrGuard \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }},OS=latest" \
            test

  ui-smoke:
    name: UI Smoke Test
    runs-on: macos-latest
    timeout-minutes: 40
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Simulator
        id: sim
        shell: bash
        run: |
          set -euo pipefail
          sim_name="$(xcrun simctl list devices available | sed -n 's/^[[:space:]]*\(iPhone[^()]*\) ([A-F0-9-]\{36\}) (.*$/\1/p' | head -n 1 | xargs)"
          if [[ -z "${sim_name}" ]]; then
            echo "No available iPhone simulator found."
            exit 1
          fi
          echo "name=${sim_name}" >> "$GITHUB_OUTPUT"

      - name: Run UI Smoke
        run: |
          xcodebuild \
            -project MehrGuard.xcodeproj \
            -scheme MehrGuard \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }},OS=latest" \
            test \
            -only-testing:MehrGuardUITests/MehrGuardUITests/testAppLaunches
