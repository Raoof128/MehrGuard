included:
  - MehrGuard
  - MehrGuardTests
  - MehrGuardUITests

excluded:
  - .build
  - MehrGuard.xcodeproj
  - Tests/MehrGuardPackageTests
  - MehrGuard/Assets.xcassets

# ── Opt-in rules ────────────────────────────────────────────────────────────────
opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - ibinspectable_in_extension
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - nimble_operator
  - nslocalizedstring_key
  - number_separator
  - object_literal
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - quick_discouraged_call
  - quick_discouraged_focused_test
  - quick_discouraged_pending_test
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - single_test_class
  - sorted_first_last
  - sorted_imports
  - static_operator
  - strong_iboutlet
  - switch_case_on_newline
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - untyped_error_in_catch
  - unused_import
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

# ── Disabled rules ───────────────────────────────────────────────────────────────
disabled_rules:
  - file_length          # Large feature views are intentionally long
  - type_body_length     # Complex ViewModels are allowed to be longer
  - function_body_length # Analysis engine functions are intentionally comprehensive

# ── Rule configuration ───────────────────────────────────────────────────────────
line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - vm
    - vc
    - x
    - y

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 50
    error: 60

function_parameter_count:
  warning: 6
  error: 8

nesting:
  type_level:
    warning: 3
  function_level:
    warning: 4

cyclomatic_complexity:
  warning: 15
  error: 25

file_header:
  required_pattern: |
                    \/\/
                    \/\/ Copyright 20\d\d(-20\d\d)? Mehr Guard Contributors
                    \/\/ SPDX-License-Identifier: Apache-2\.0

reporter: "xcode"
